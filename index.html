<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>SiteTrack — Base Station Issue Tracker</title>
<style>
  :root{
    --bg:#EEF0F5; --panel:#FFFFFF; --border:#E3E6EE; --accent:#4E8FE0; --accentDark:#3A76C4;
    --open:#E0891E; --openFill:#FBEBD8; --closed:#1FA85C; --closedFill:#DCF3E6;
    --muted:#9AA3B2; --text:#2E3542; --subtext:#78818F; --inputBg:#F4F5F9; --danger:#E0526B;
    --shadow:#D7DBE4;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0; overscroll-behavior:none;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); display:flex; flex-direction:column;
    height:100vh; height:100dvh; overflow:hidden;
  }
  /* ---- header ---- */
  header{background:var(--panel); border-bottom:1px solid var(--border); padding:10px 14px;
    padding-top:max(10px, env(safe-area-inset-top)); flex-shrink:0;}
  .header-row{display:flex; align-items:center; justify-content:space-between;}
  .brand{display:flex; align-items:center; gap:8px;}
  .brand .icon{font-size:20px;}
  .brand .titles{line-height:1.15;}
  .brand .titles .t1{font-weight:700; font-size:15px;}
  .brand .titles .t2{font-size:9px; color:var(--muted); letter-spacing:.5px;}
  #menuBtn{background:var(--inputBg); border:1px solid var(--border); border-radius:8px;
    width:36px; height:36px; font-size:18px; color:var(--accent); display:flex;
    align-items:center; justify-content:center;}
  .stats{display:flex; gap:6px; margin-top:10px;}
  .stat{flex:1; text-align:center; border-radius:10px; padding:6px 4px; border:1px solid;}
  .stat .n{font-size:18px; font-weight:800; line-height:1.1;}
  .stat .l{font-size:8px; color:var(--muted); letter-spacing:1px; margin-top:2px;}
  .stat.open{background:var(--openFill); border-color:#f0c791;}
  .stat.closed{background:var(--closedFill); border-color:#9fdcb9;}
  .stat.total{background:#E4EDFB; border-color:#b7d0f5;}
  .stat.open .n{color:var(--open);} .stat.closed .n{color:var(--closed);} .stat.total .n{color:var(--accent);}

  /* ---- controls ---- */
  .controls{padding:10px 14px 0; flex-shrink:0; background:var(--panel);}
  .field{width:100%; background:var(--inputBg); border:1px solid var(--border); border-radius:9px;
    padding:9px 11px; font-size:14px; color:var(--text); margin-bottom:8px;}
  select.field{-webkit-appearance:none; appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%239AA3B2'/></svg>");
    background-repeat:no-repeat; background-position:right 12px center;}
  .chips{display:flex; gap:6px; margin-bottom:10px;}
  .chip{flex:1; text-align:center; padding:7px 0; border-radius:20px; font-size:12px; font-weight:700;
    background:var(--inputBg); color:var(--muted); border:1px solid var(--border);}
  .chip.active{background:var(--accent); color:#fff; border-color:var(--accent);}
  .tabs{display:flex; border-bottom:1px solid var(--border);}
  .tab{flex:1; text-align:center; padding:10px 0; font-size:13px; font-weight:700; color:var(--muted);
    border-bottom:2px solid transparent;}
  .tab.active{color:var(--accent); border-bottom-color:var(--accent);}

  /* ---- list view ---- */
  #listView{flex:1; overflow-y:auto; padding:10px 14px 90px; -webkit-overflow-scrolling:touch;}
  .card{background:var(--inputBg); border:1px solid var(--border); border-radius:12px; padding:12px;
    margin-bottom:10px;}
  .card.open{border-left:4px solid var(--open);}
  .card.closed{border-left:4px solid var(--closed);}
  .card .top{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .card .id{font-family:ui-monospace,Consolas,monospace; font-size:11px; font-weight:700; color:var(--subtext);}
  .badge{font-size:9px; font-weight:800; letter-spacing:1px; padding:3px 8px; border-radius:20px;}
  .badge.open{background:var(--openFill); color:var(--open);}
  .badge.closed{background:var(--closedFill); color:var(--closed);}
  .card .site{font-weight:700; font-size:13px; margin-bottom:3px;}
  .card .desc{font-size:13px; color:var(--subtext); line-height:1.4; margin-bottom:8px;}
  .card .meta{font-size:10px; color:var(--muted); margin-bottom:8px;}
  .card .actions{display:flex; gap:6px;}
  .card .actions button{flex:1; padding:8px 0; border-radius:8px; border:1px solid var(--border);
    background:#fff; font-size:11px; font-weight:700;}
  .btn-edit{color:var(--text);} .btn-toggle{color:var(--accent);} .btn-del{color:var(--danger);}
  .empty-note{text-align:center; color:var(--muted); font-size:13px; padding:50px 20px;}

  /* ---- map view ---- */
  #mapView{flex:1; position:relative; overflow:hidden; display:none; touch-action:none;}
  #mapSvg{width:100%; height:100%; display:block; background:var(--bg);}
  .map-legend{position:absolute; top:10px; left:10px; background:rgba(255,255,255,.92);
    border:1px solid var(--border); border-radius:10px; padding:6px 10px; font-size:10px;
    color:var(--subtext); display:flex; gap:10px; align-items:center; backdrop-filter:blur(4px);}
  .legend-dot{width:10px; height:10px; border-radius:3px; display:inline-block; margin-right:3px; vertical-align:-1px;}
  .zoom-controls{position:absolute; right:10px; bottom:14px; display:flex; flex-direction:column; gap:6px;}
  .zoom-controls button{width:42px; height:42px; border-radius:12px; background:#fff;
    border:1px solid var(--border); font-size:18px; font-weight:700; color:var(--accent);
    box-shadow:0 2px 6px rgba(0,0,0,.08);}
  .zoom-controls button#fitBtn{font-size:10px; font-weight:800;}
  .detail-bar{position:absolute; left:10px; right:10px; bottom:14px; background:#fff;
    border:1px solid var(--border); border-radius:12px; padding:10px 12px; box-shadow:0 4px 14px rgba(0,0,0,.1);
    display:none;}
  .detail-bar.show{display:block;}
  .detail-bar .txt{font-size:12px; margin-bottom:8px; line-height:1.4;}
  .detail-bar .actions{display:flex; gap:6px;}
  .detail-bar .actions button{flex:1; padding:8px 0; border-radius:8px; border:1px solid var(--border);
    background:var(--inputBg); font-size:11px; font-weight:700;}

  /* ---- FAB ---- */
  #fab{position:fixed; right:18px; bottom:18px; width:56px; height:56px; border-radius:50%;
    background:var(--accent); color:#fff; font-size:26px; border:none; box-shadow:0 4px 14px rgba(78,143,224,.5);
    z-index:50; display:flex; align-items:center; justify-content:center;}

  /* ---- modal ---- */
  .overlay{position:fixed; inset:0; background:rgba(20,25,35,.45); display:none; align-items:flex-end;
    z-index:100;}
  .overlay.show{display:flex;}
  .sheet{background:#fff; width:100%; border-radius:18px 18px 0 0; padding:18px 18px max(18px, env(safe-area-inset-bottom));
    max-height:80vh; overflow-y:auto;}
  .sheet h3{margin:0 0 14px; font-size:15px;}
  .sheet label{font-size:10px; color:var(--muted); letter-spacing:1px; display:block; margin:10px 0 4px;}
  .sheet input, .sheet textarea{width:100%; background:var(--inputBg); border:1px solid var(--border);
    border-radius:9px; padding:10px 12px; font-size:14px; color:var(--text); font-family:inherit;}
  .sheet textarea{resize:vertical; min-height:70px;}
  .sheet .btnrow{display:flex; gap:8px; margin-top:16px;}
  .sheet .btnrow button{flex:1; padding:12px 0; border-radius:10px; border:none; font-size:13px; font-weight:700;}
  .btn-cancel{background:var(--inputBg); color:var(--muted);}
  .btn-save{background:var(--accent); color:#fff;}

  /* ---- export menu ---- */
  .menu{position:fixed; top:56px; right:14px; background:#fff; border:1px solid var(--border);
    border-radius:12px; box-shadow:0 6px 20px rgba(0,0,0,.15); display:none; z-index:90; overflow:hidden;
    padding-top:max(0px, env(safe-area-inset-top));}
  .menu.show{display:block;}
  .menu button{display:block; width:100%; text-align:left; padding:12px 16px; background:none; border:none;
    font-size:13px; color:var(--text); border-bottom:1px solid var(--border); white-space:nowrap;}
  .menu button:last-child{border-bottom:none;}

  /* ---- toast ---- */
  #toast{position:fixed; left:50%; bottom:90px; transform:translateX(-50%) translateY(20px); opacity:0;
    background:var(--accent); color:#fff; padding:10px 18px; border-radius:20px; font-size:12px;
    font-weight:700; z-index:200; transition:all .25s; pointer-events:none;}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="brand">
      <div class="icon">📡</div>
      <div class="titles">
        <div class="t1">SiteTrack</div>
        <div class="t2">BASE STATION NOC</div>
      </div>
    </div>
    <button id="menuBtn">⋮</button>
  </div>
  <div class="stats">
    <div class="stat open"><div class="n" id="statOpen">0</div><div class="l">OPEN</div></div>
    <div class="stat closed"><div class="n" id="statClosed">0</div><div class="l">CLOSED</div></div>
    <div class="stat total"><div class="n" id="statTotal">0</div><div class="l">TOTAL</div></div>
  </div>
</header>

<div class="controls">
  <input class="field" id="searchInput" placeholder="Search site, issue, or ID…">
  <select class="field" id="siteSelect"><option>All Sites</option></select>
  <div class="chips">
    <div class="chip active" data-filter="All">All</div>
    <div class="chip" data-filter="Open">Open</div>
    <div class="chip" data-filter="Closed">Closed</div>
  </div>
  <div class="tabs">
    <div class="tab active" data-view="list">List</div>
    <div class="tab" data-view="map">Mind Map</div>
  </div>
</div>

<div id="listView"></div>

<div id="mapView">
  <svg id="mapSvg"><g id="viewport"><g id="nodes"></g></g></svg>
  <div class="map-legend">
    <span><span class="legend-dot" style="background:var(--openFill);border:1.5px solid var(--open)"></span>Open</span>
    <span><span class="legend-dot" style="background:var(--closedFill);border:1.5px solid var(--closed)"></span>Closed</span>
    <span>Drag nodes to move · pinch to zoom</span>
  </div>
  <div class="zoom-controls">
    <button id="zoomInBtn">+</button>
    <button id="fitBtn">FIT</button>
    <button id="zoomOutBtn">−</button>
  </div>
  <div class="detail-bar" id="detailBar">
    <div class="txt" id="detailTxt"></div>
    <div class="actions">
      <button id="detailEdit">EDIT</button>
      <button id="detailToggle">TOGGLE</button>
      <button id="detailDel">DELETE</button>
    </div>
  </div>
</div>

<button id="fab">+</button>

<div class="menu" id="exportMenu">
  <button id="mCsv">Export CSV</button>
  <button id="mExcel">Export Excel (.xls)</button>
  <button id="mSvg">Export Map (SVG, vector)</button>
  <button id="mPng">Export Map (PNG image)</button>
  <button id="mReset">Reset Map Layout</button>
</div>

<div class="overlay" id="formOverlay">
  <div class="sheet">
    <h3 id="formTitle">Log New Issue</h3>
    <label>SITE ID</label>
    <input id="formSite" placeholder="e.g. BTS-NORTH-01">
    <label>ISSUE DESCRIPTION</label>
    <textarea id="formIssue" placeholder="Describe the fault or problem…"></textarea>
    <div class="btnrow">
      <button class="btn-cancel" id="formCancel">Cancel</button>
      <button class="btn-save" id="formSave">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
"use strict";

// ───────────────────────── constants ─────────────────────────
var SITE_COLORS = ["#3DBEB0","#F2965C","#5C9DE8","#B07CD6","#E3B23C","#E8748A","#6FBF73","#5CC2E0"];
var STATUS = { Open:{color:"#E0891E",fill:"#FBEBD8"}, Closed:{color:"#1FA85C",fill:"#DCF3E6"} };
var SITE_R = 34, ISSUE_W = 148, ISSUE_H = 42, MARGIN = 34, CARD_W = 176, CARD_H = 88;
var STORAGE_KEY = "sitetrack_issues_v1";
var POS_KEY = "sitetrack_positions_v1";

// ───────────────────────── state ─────────────────────────
var issues = [];
var nodePositions = {};   // "site:NAME" or "issue:ID" -> {x,y}
var filter = "All", siteFilter = "All Sites", search = "";
var selectedId = null;
var view = "list";
var zoom = 1, panX = 0, panY = 0;
var minZoom = 0.35, maxZoom = 3;
var lastSiteNodes = [], lastIssueNodes = [];
var editingId = null;

// ───────────────────────── storage ─────────────────────────
function loadAll(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    issues = raw ? JSON.parse(raw) : null;
  }catch(e){ issues = null; }
  if(!issues){
    var now = Date.now();
    issues = [
      mkIssue("BTS-NORTH-01","Power unit failure - backup generator offline","Open", now-5*3600000),
      mkIssue("BTS-EAST-07","High packet loss on backhaul link","Open", now-2*3600000),
      mkIssue("BTS-SOUTH-03","Antenna alignment drift detected","Closed", now-8*3600000),
      mkIssue("BTS-NORTH-01","Cooling fan number 2 degraded","Closed", now-1*3600000),
      mkIssue("BTS-WEST-12","SFP module link down","Open", now-1800000)
    ];
    saveIssues();
  }
  try{
    var rawPos = localStorage.getItem(POS_KEY);
    nodePositions = rawPos ? JSON.parse(rawPos) : {};
  }catch(e){ nodePositions = {}; }
}
function saveIssues(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(issues)); }
  catch(e){ showToast("Warning: could not save (storage unavailable)"); }
}
function savePositions(){
  try{ localStorage.setItem(POS_KEY, JSON.stringify(nodePositions)); }catch(e){}
}
function nextId(){
  var max = 0;
  issues.forEach(function(i){
    var n = parseInt(i.id.split("-").pop(), 10);
    if(!isNaN(n)) max = Math.max(max, n);
  });
  return "ISS-" + String(max+1).padStart(4,"0");
}
function mkIssue(site, text, status, ts){
  return { id: "ISS-TMP", site: site, issue: text, status: status, ts: ts };
}

// ───────────────────────── data ops ─────────────────────────
function addIssue(site, text){
  var iss = { id: nextId(), site: site, issue: text, status: "Open", ts: Date.now() };
  issues.unshift(iss);
  saveIssues();
  return iss;
}
function updateIssueData(id, site, text){
  var iss = issues.find(function(i){ return i.id===id; });
  if(!iss) return false;
  iss.site = site; iss.issue = text;
  saveIssues();
  return true;
}
function toggleStatus(id){
  var iss = issues.find(function(i){ return i.id===id; });
  if(!iss) return;
  iss.status = iss.status==="Open" ? "Closed" : "Open";
  saveIssues();
}
function deleteIssue(id){
  issues = issues.filter(function(i){ return i.id!==id; });
  saveIssues();
}
function getSiteList(){
  var set = {};
  issues.forEach(function(i){ set[i.site]=true; });
  return Object.keys(set).sort();
}
function getVisible(){
  return issues.filter(function(i){
    if(siteFilter!=="All Sites" && i.site!==siteFilter) return false;
    if(filter!=="All" && i.status!==filter) return false;
    if(search){
      var q = search.toLowerCase();
      if(i.site.toLowerCase().indexOf(q)<0 && i.issue.toLowerCase().indexOf(q)<0 && i.id.toLowerCase().indexOf(q)<0) return false;
    }
    return true;
  }).sort(function(a,b){ return b.ts-a.ts; });
}
function fmtTime(ts){
  var s = (Date.now()-ts)/1000;
  if(s<60) return "just now";
  if(s<3600) return Math.floor(s/60)+"m ago";
  if(s<86400) return Math.floor(s/3600)+"h ago";
  return Math.floor(s/86400)+"d ago";
}
function fmtDate(ts){
  var d = new Date(ts);
  var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return d.getDate()+" "+months[d.getMonth()];
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ───────────────────────── list view ─────────────────────────
function renderList(){
  var visible = getVisible();
  var el = document.getElementById("listView");
  if(visible.length===0){ el.innerHTML = '<div class="empty-note">No issues match — try clearing filters.</div>'; return; }
  el.innerHTML = visible.map(function(iss){
    var cls = iss.status.toLowerCase();
    return '<div class="card '+cls+'" data-id="'+iss.id+'">'+
      '<div class="top"><span class="id">'+iss.id+'</span><span class="badge '+cls+'">'+iss.status.toUpperCase()+'</span></div>'+
      '<div class="site">'+esc(iss.site)+'</div>'+
      '<div class="desc">'+esc(iss.issue)+'</div>'+
      '<div class="meta">'+fmtTime(iss.ts)+' · registered '+fmtDate(iss.ts)+'</div>'+
      '<div class="actions">'+
        '<button class="btn-edit" data-act="edit">Edit</button>'+
        '<button class="btn-toggle" data-act="toggle">'+(iss.status==="Open"?"Close":"Reopen")+'</button>'+
        '<button class="btn-del" data-act="del">Delete</button>'+
      '</div></div>';
  }).join("");
  Array.prototype.forEach.call(el.querySelectorAll(".card"), function(card){
    var id = card.getAttribute("data-id");
    card.querySelector('[data-act="edit"]').addEventListener("click", function(){ openEdit(id); });
    card.querySelector('[data-act="toggle"]').addEventListener("click", function(){ toggleStatus(id); refreshAll(); showToast("Status updated"); });
    card.querySelector('[data-act="del"]').addEventListener("click", function(){ deleteIssue(id); refreshAll(true); showToast("Issue removed"); });
  });
}

// ───────────────────────── map layout ─────────────────────────
function ringRadius(n, nodeR, minR){
  if(n<=1) return minR;
  var circumference = n*(2*nodeR+MARGIN);
  return Math.max(minR, circumference/(2*Math.PI));
}
function computeLayout(list){
  var sitesMap = {}; var order = [];
  list.forEach(function(iss){
    if(!sitesMap[iss.site]){ sitesMap[iss.site]=[]; order.push(iss.site); }
    sitesMap[iss.site].push(iss);
  });
  var numSites = order.length;
  var issueFootprint = Math.hypot(ISSUE_W/2, ISSUE_H/2);
  var issueRadii = {};
  order.forEach(function(s){ issueRadii[s] = ringRadius(sitesMap[s].length, issueFootprint, 105); });
  var maxIssueR = 105;
  order.forEach(function(s){ maxIssueR = Math.max(maxIssueR, issueRadii[s]); });
  var siteRadius = ringRadius(numSites, SITE_R, 170);
  siteRadius = Math.max(siteRadius, 2*maxIssueR*0.8+80);

  var siteNodes = order.map(function(s,i){
    var angle = numSites ? (2*Math.PI*i/numSites - Math.PI/2) : 0;
    var dx = siteRadius*Math.cos(angle), dy = siteRadius*Math.sin(angle);
    var ov = nodePositions["site:"+s];
    return { site:s, x: ov?ov.x:dx, y: ov?ov.y:dy, angle:angle };
  });
  var issueNodes = [];
  siteNodes.forEach(function(sn){
    var list2 = sitesMap[sn.site];
    var n = list2.length;
    var r = issueRadii[sn.site];
    var startAngle = sn.angle - Math.PI;
    list2.forEach(function(iss,j){
      var a = startAngle + (n ? (2*Math.PI*j/n) : 0);
      var dx = sn.x + r*Math.cos(a), dy = sn.y + r*Math.sin(a);
      var ov = nodePositions["issue:"+iss.id];
      issueNodes.push({ issue:iss, x: ov?ov.x:dx, y: ov?ov.y:dy, sx:sn.x, sy:sn.y });
    });
  });
  return { siteNodes:siteNodes, issueNodes:issueNodes };
}
function fitToScreen(){
  var list = getVisible();
  var layout = computeLayout(list);
  var xs=[0], ys=[0];
  layout.siteNodes.forEach(function(n){ xs.push(n.x-SITE_R, n.x+SITE_R); ys.push(n.y-SITE_R, n.y+SITE_R); });
  layout.issueNodes.forEach(function(n){ xs.push(n.x-ISSUE_W/2, n.x+ISSUE_W/2); ys.push(n.y-ISSUE_H/2, n.y+ISSUE_H/2); });
  var pad = 50;
  var w = (Math.max.apply(null,xs)-Math.min.apply(null,xs))+2*pad;
  var h = (Math.max.apply(null,ys)-Math.min.apply(null,ys))+2*pad;
  var svg = document.getElementById("mapSvg");
  var cw = svg.clientWidth||360, ch = svg.clientHeight||500;
  var z = Math.min(cw/w, ch/h);
  zoom = Math.max(minZoom, Math.min(z, 1.3));
  panX = -((Math.min.apply(null,xs)+Math.max.apply(null,xs))/2)*zoom;
  panY = -((Math.min.apply(null,ys)+Math.max.apply(null,ys))/2)*zoom;
  renderMap();
}

// ───────────────────────── map render ─────────────────────────
var SVGNS = "http://www.w3.org/2000/svg";
function svgEl(tag, attrs){
  var el = document.createElementNS(SVGNS, tag);
  for(var k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}
function wrapLines(text){
  var words = text.split(" ");
  var l1 = words.slice(0,5).join(" ");
  var rest = words.slice(5);
  if(rest.length===0) return [l1];
  var l2 = rest.slice(0,5).join(" ") + (rest.length>5 ? "…" : "");
  return [l1, l2];
}
function sCurvePath(x1,y1,x2,y2){
  var mx = x1 + (x2-x1)*0.55;
  return "M "+x1+","+y1+" C "+mx+","+y1+" "+mx+","+y2+" "+x2+","+y2;
}
function renderMap(){
  var svg = document.getElementById("mapSvg");
  var cw = svg.clientWidth||360, ch = svg.clientHeight||500;
  svg.setAttribute("viewBox","0 0 "+cw+" "+ch);
  var viewport = document.getElementById("viewport");
  viewport.setAttribute("transform", "translate("+(cw/2+panX)+","+(ch/2+panY)+") scale("+zoom+")");

  var nodesG = document.getElementById("nodes");
  nodesG.innerHTML = "";

  var list = getVisible();
  var total = issues.length;

  if(list.length===0){
    drawCenter(nodesG, total);
    var t = svgEl("text",{x:0,y:120,"text-anchor":"middle",fill:"#9AA3B2","font-size":13});
    t.textContent = "No issues match — try clearing filters";
    nodesG.appendChild(t);
    lastSiteNodes=[]; lastIssueNodes=[];
    return;
  }

  var layout = computeLayout(list);
  lastSiteNodes = layout.siteNodes; lastIssueNodes = layout.issueNodes;
  var siteNames = layout.siteNodes.map(function(n){return n.site;}).sort();
  var colorMap = {};
  siteNames.forEach(function(s,i){ colorMap[s]=SITE_COLORS[i%SITE_COLORS.length]; });

  // center -> site curves
  layout.siteNodes.forEach(function(sn){
    var p = svgEl("path",{ d:sCurvePath(0,0,sn.x,sn.y), fill:"none", stroke:colorMap[sn.site], "stroke-width":3, "stroke-linecap":"round" });
    nodesG.appendChild(p);
  });
  // site -> issue curves + date label
  layout.issueNodes.forEach(function(n){
    var iss = n.issue;
    var col = colorMap[iss.site];
    var selected = selectedId===iss.id;
    var p = svgEl("path",{ d:sCurvePath(n.sx,n.sy,n.x,n.y), fill:"none", stroke:col,
      "stroke-width": selected?2.6:1.9, "stroke-linecap":"round" });
    nodesG.appendChild(p);
    var dir = n.x>=n.sx ? 1 : -1;
    var dt = svgEl("text",{x:n.sx+dir*(SITE_R+10), y:n.sy-9, "text-anchor":(dir>0?"start":"end"), fill:"#9AA3B2",
      "font-size":9, "font-style":"italic"});
    dt.textContent = fmtDate(iss.ts);
    nodesG.appendChild(dt);
  });

  drawCenter(nodesG, total);

  // site nodes
  layout.siteNodes.forEach(function(sn){
    var col = colorMap[sn.site];
    var g = svgEl("g",{ class:"node-site", "data-key":"site:"+sn.site });
    g.appendChild(svgEl("circle",{cx:sn.x+2,cy:sn.y+3,r:SITE_R,fill:"#D7DBE4",opacity:.6}));
    g.appendChild(svgEl("circle",{cx:sn.x,cy:sn.y,r:SITE_R,fill:"#fff",stroke:col,"stroke-width":2.6}));
    var t = svgEl("text",{x:sn.x,y:sn.y+4,"text-anchor":"middle",fill:"#2E3542","font-size":10,"font-weight":700});
    t.textContent = sn.site;
    g.appendChild(t);
    nodesG.appendChild(g);
    attachDrag(g, "site", sn.site);
  });

  // issue nodes
  layout.issueNodes.forEach(function(n){
    var iss = n.issue;
    var sc = STATUS[iss.status];
    var selected = selectedId===iss.id;
    var hw = ISSUE_W/2, hh = ISSUE_H/2;
    var g = svgEl("g",{ class:"node-issue", "data-key":"issue:"+iss.id });
    g.appendChild(svgEl("rect",{x:n.x-hw+2,y:n.y-hh+3,width:ISSUE_W,height:ISSUE_H,rx:10,fill:"#D7DBE4",opacity:.6}));
    var rect = svgEl("rect",{x:n.x-hw,y:n.y-hh,width:ISSUE_W,height:ISSUE_H,rx:10,fill:sc.fill,stroke:sc.color,
      "stroke-width": selected?2.4:1.6});
    g.appendChild(rect);
    if(selected){
      g.appendChild(svgEl("rect",{x:n.x-hw-3,y:n.y-hh-3,width:ISSUE_W+6,height:ISSUE_H+6,rx:12,fill:"none",
        stroke:sc.color,"stroke-width":1.2}));
    }
    var lines = wrapLines(iss.issue);
    var startY = n.y - (lines.length-1)*6.5;
    lines.forEach(function(line, idx){
      var t = svgEl("text",{x:n.x,y:startY+idx*13,"text-anchor":"middle",fill:"#2E3542","font-size":9});
      t.textContent = line;
      g.appendChild(t);
    });
    nodesG.appendChild(g);
    attachDrag(g, "issue", iss.id);
  });
}
function drawCenter(nodesG, count){
  var hw=CARD_W/2, hh=CARD_H/2;
  nodesG.appendChild(svgEl("rect",{x:-hw+3,y:-hh+4,width:CARD_W,height:CARD_H,rx:16,fill:"#D7DBE4",opacity:.6}));
  nodesG.appendChild(svgEl("rect",{x:-hw,y:-hh,width:CARD_W,height:CARD_H,rx:16,fill:"#fff",stroke:"#E3E6EE"}));
  var icon = svgEl("text",{x:0,y:-16,"text-anchor":"middle","font-size":20});
  icon.textContent = "📡"; nodesG.appendChild(icon);
  var t1 = svgEl("text",{x:0,y:6,"text-anchor":"middle",fill:"#2E3542","font-size":12,"font-weight":700});
  t1.textContent = "Base Station Issue Map"; nodesG.appendChild(t1);
  var t2 = svgEl("text",{x:0,y:26,"text-anchor":"middle",fill:"#78818F","font-size":9});
  t2.textContent = count+" tracked issue"+(count!==1?"s":""); nodesG.appendChild(t2);
}

// ───────────────────────── map interaction ─────────────────────────
var CLICK_TOL = 6;
var dragState = null; // {kind,key,startLocal:{x,y},startClient:{x,y},moved}
var panState = null;  // {startClient, startPan}
var pinchState = null;// {startDist, startZoom}
var activePointers = {};

function findLocal(kind, key){
  if(kind==="site"){
    var n = lastSiteNodes.find(function(s){ return s.site===key; });
    return n ? {x:n.x,y:n.y} : {x:0,y:0};
  }else{
    var n2 = lastIssueNodes.find(function(s){ return s.issue.id===key; });
    return n2 ? {x:n2.x,y:n2.y} : {x:0,y:0};
  }
}
function attachDrag(g, kind, key){
  g.addEventListener("pointerdown", function(e){
    e.stopPropagation();
    g.setPointerCapture(e.pointerId);
    dragState = { kind:kind, key:key, startLocal:findLocal(kind,key),
      startClient:{x:e.clientX,y:e.clientY}, moved:false, pointerId:e.pointerId };
  });
  g.addEventListener("pointermove", function(e){
    if(!dragState || dragState.pointerId!==e.pointerId) return;
    var dx = e.clientX-dragState.startClient.x, dy = e.clientY-dragState.startClient.y;
    if(!dragState.moved && (Math.abs(dx)>CLICK_TOL || Math.abs(dy)>CLICK_TOL)) dragState.moved = true;
    if(dragState.moved){
      var nx = dragState.startLocal.x + dx/zoom, ny = dragState.startLocal.y + dy/zoom;
      nodePositions[dragState.kind+":"+dragState.key] = {x:nx,y:ny};
      renderMap();
    }
  });
  g.addEventListener("pointerup", function(e){
    if(!dragState || dragState.pointerId!==e.pointerId) return;
    if(!dragState.moved){
      if(kind==="issue"){
        selectedId = (selectedId===key) ? null : key;
        showDetail();
        renderMap();
      }else{
        if(key!=="All Sites"){ siteFilter=key; document.getElementById("siteSelect").value=key; refreshAll(false); showToast("Filtered to "+key); }
      }
    }else{
      savePositions();
    }
    dragState = null;
  });
}
function showDetail(){
  var bar = document.getElementById("detailBar");
  if(!selectedId){ bar.classList.remove("show"); return; }
  var iss = issues.find(function(i){ return i.id===selectedId; });
  if(!iss){ bar.classList.remove("show"); return; }
  document.getElementById("detailTxt").innerHTML =
    "<b>"+iss.id+"</b> · "+esc(iss.site)+" · <b>"+iss.status.toUpperCase()+"</b><br>"+esc(iss.issue);
  bar.classList.add("show");
}
document.getElementById("detailEdit").addEventListener("click", function(){ if(selectedId) openEdit(selectedId); });
document.getElementById("detailToggle").addEventListener("click", function(){
  if(selectedId){ toggleStatus(selectedId); refreshAll(false); showToast("Status updated"); showDetail(); }
});
document.getElementById("detailDel").addEventListener("click", function(){
  if(selectedId){ deleteIssue(selectedId); selectedId=null; refreshAll(true); showToast("Issue removed"); }
});

// background pan + wheel zoom + pinch zoom
var mapViewEl = document.getElementById("mapView");
mapViewEl.addEventListener("pointerdown", function(e){
  if(e.target.closest(".node-site,.node-issue,.zoom-controls,.detail-bar")) return;
  panState = { startClient:{x:e.clientX,y:e.clientY}, startPan:{x:panX,y:panY} };
  mapViewEl.setPointerCapture(e.pointerId);
});
mapViewEl.addEventListener("pointermove", function(e){
  if(panState && !dragState){
    panX = panState.startPan.x + (e.clientX-panState.startClient.x);
    panY = panState.startPan.y + (e.clientY-panState.startClient.y);
    renderMap();
  }
});
mapViewEl.addEventListener("pointerup", function(){ panState=null; });
mapViewEl.addEventListener("wheel", function(e){
  e.preventDefault();
  zoomStep(e.deltaY<0 ? 1.1 : 0.9);
},{passive:false});

// touch pinch (two-finger) — separate from pointer events for reliability
mapViewEl.addEventListener("touchstart", function(e){
  if(e.touches.length===2){
    panState = null;
    var d = touchDist(e.touches);
    pinchState = { startDist:d, startZoom:zoom };
  }
},{passive:true});
mapViewEl.addEventListener("touchmove", function(e){
  if(e.touches.length===2 && pinchState){
    e.preventDefault();
    var d = touchDist(e.touches);
    var ratio = d/pinchState.startDist;
    zoom = Math.max(minZoom, Math.min(pinchState.startZoom*ratio, maxZoom));
    renderMap();
  }
},{passive:false});
mapViewEl.addEventListener("touchend", function(e){
  if(e.touches.length<2) pinchState=null;
});
function touchDist(t){
  var dx = t[0].clientX-t[1].clientX, dy = t[0].clientY-t[1].clientY;
  return Math.hypot(dx,dy);
}
function zoomStep(factor){ zoom = Math.max(minZoom, Math.min(zoom*factor, maxZoom)); renderMap(); }
document.getElementById("zoomInBtn").addEventListener("click", function(){ zoomStep(1.2); });
document.getElementById("zoomOutBtn").addEventListener("click", function(){ zoomStep(1/1.2); });
document.getElementById("fitBtn").addEventListener("click", fitToScreen);

window.addEventListener("resize", function(){ if(view==="map") renderMap(); });

// ───────────────────────── form (add / edit) ─────────────────────────
var overlay = document.getElementById("formOverlay");
function openAdd(){
  editingId = null;
  document.getElementById("formTitle").textContent = "Log New Issue";
  document.getElementById("formSite").value = "";
  document.getElementById("formIssue").value = "";
  overlay.classList.add("show");
  setTimeout(function(){ document.getElementById("formSite").focus(); }, 100);
}
function openEdit(id){
  var iss = issues.find(function(i){ return i.id===id; });
  if(!iss) return;
  editingId = id;
  document.getElementById("formTitle").textContent = "Edit "+id;
  document.getElementById("formSite").value = iss.site;
  document.getElementById("formIssue").value = iss.issue;
  overlay.classList.add("show");
}
document.getElementById("fab").addEventListener("click", openAdd);
document.getElementById("formCancel").addEventListener("click", function(){ overlay.classList.remove("show"); });
overlay.addEventListener("click", function(e){ if(e.target===overlay) overlay.classList.remove("show"); });
document.getElementById("formSave").addEventListener("click", function(){
  var site = document.getElementById("formSite").value.trim().toUpperCase();
  var text = document.getElementById("formIssue").value.trim();
  if(!site || !text){ showToast("Enter both site and issue"); return; }
  if(editingId){
    updateIssueData(editingId, site, text);
    showToast(editingId+" updated");
  }else{
    var iss = addIssue(site, text);

    document.getElementById("searchInput").value="";
    document.getElementById("siteSelect").value="All Sites";

// ───────────────────────── controls wiring ─────────────────────────
document.getElementById("searchInput").addEventListener("input", function(e){
  search = e.target.value; refreshAll(true);
});
document.getElementById("siteSelect").addEventListener("change", function(e){
  siteFilter = e.target.value; refreshAll(true);
});
function setActiveChip(name){
  Array.prototype.forEach.call(document.querySelectorAll(".chip"), function(c){
    c.classList.toggle("active", c.getAttribute("data-filter")===name);
  });
}
Array.prototype.forEach.call(document.querySelectorAll(".chip"), function(c){
  c.addEventListener("click", function(){
    filter = c.getAttribute("data-filter");
    setActiveChip(filter);
    refreshAll(true);
  });
});
Array.prototype.forEach.call(document.querySelectorAll(".tab"), function(t){
  t.addEventListener("click", function(){
    view = t.getAttribute("data-view");
    Array.prototype.forEach.call(document.querySelectorAll(".tab"), function(x){ x.classList.toggle("active", x===t); });
    document.getElementById("listView").style.display = view==="list" ? "block" : "none";

// ───────────────────────── export menu ─────────────────────────
var menu = document.getElementById("exportMenu");
document.getElementById("menuBtn").addEventListener("click", function(e){
  e.stopPropagation(); menu.classList.toggle("show");
});
document.addEventListener("click", function(){ menu.classList.remove("show"); });

function download(filename, blob){
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}
document.getElementById("mCsv").addEventListener("click", function(){
  var rows = getVisible();
  var lines = ["ID,Site,Issue,Status,Logged At"];
  rows.forEach(function(iss){
    var d = new Date(iss.ts).toISOString().slice(0,19).replace("T"," ");
    var vals = [iss.id, iss.site, '"'+iss.issue.replace(/"/g,'""')+'"', iss.status, d];
    lines.push(vals.join(","));
  });
  download("site_issues.csv", new Blob([lines.join("\n")], {type:"text/csv"}));
  showToast("Exported "+rows.length+" issues to CSV");
});
document.getElementById("mExcel").addEventListener("click", function(){
  var rows = getVisible();
  var rowsXml = ['<Row><Cell ss:StyleID="header"><Data ss:Type="String">ID</Data></Cell>'+
    '<Cell ss:StyleID="header"><Data ss:Type="String">Site</Data></Cell>'+
    '<Cell ss:StyleID="header"><Data ss:Type="String">Issue</Data></Cell>'+
    '<Cell ss:StyleID="header"><Data ss:Type="String">Status</Data></Cell>'+
    '<Cell ss:StyleID="header"><Data ss:Type="String">Logged At</Data></Cell></Row>'];
  rows.forEach(function(iss){
    var style = iss.status==="Open" ? "open" : "closed";
    var d = new Date(iss.ts).toISOString().slice(0,19).replace("T"," ");
    rowsXml.push("<Row>"+
      '<Cell><Data ss:Type="String">'+esc(iss.id)+'</Data></Cell>'+
      '<Cell><Data ss:Type="String">'+esc(iss.site)+'</Data></Cell>'+
      '<Cell><Data ss:Type="String">'+esc(iss.issue)+'</Data></Cell>'+
      '<Cell ss:StyleID="'+style+'"><Data ss:Type="String">'+esc(iss.status)+'</Data></Cell>'+
      '<Cell><Data ss:Type="String">'+esc(d)+'</Data></Cell></Row>');
  });
  var xml = '<?xml version="1.0"?>\n<?mso-application progid="Excel.Sheet"?>\n'+
    '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" '+
    'xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n'+
    '<Styles>\n<Style ss:ID="header"><Font ss:Bold="1"/><Interior ss:Color="#DDE3EC" ss:Pattern="Solid"/></Style>\n'+
    '<Style ss:ID="open"><Interior ss:Color="#FCE4C4" ss:Pattern="Solid"/></Style>\n'+
    '<Style ss:ID="closed"><Interior ss:Color="#C9F0D8" ss:Pattern="Solid"/></Style>\n</Styles>\n'+
    '<Worksheet ss:Name="Site Issues"><Table>\n'+rowsXml.join("\n")+'\n</Table></Worksheet>\n</Workbook>';
  download("site_issues.xls", new Blob([xml], {type:"application/vnd.ms-excel"}));
  showToast("Exported "+rows.length+" issues to Excel");
});
document.getElementById("mSvg").addEventListener("click", function(){
  var svg = document.getElementById("mapSvg");
  var clone = svg.cloneNode(true);
  clone.setAttribute("xmlns", SVGNS);
  clone.setAttribute("width", svg.clientWidth);
  clone.setAttribute("height", svg.clientHeight);
  var bgRect = svgEl("rect",{x:-5000,y:-5000,width:10000,height:10000,fill:"#EEF0F5"});
  clone.querySelector("#viewport").insertBefore(bgRect, clone.querySelector("#viewport").firstChild);
  var xml = new XMLSerializer().serializeToString(clone);
  download("mindmap.svg", new Blob([xml], {type:"image/svg+xml"}));
  showToast("Map exported as SVG (vector, always crisp)");
});
document.getElementById("mPng").addEventListener("click", function(){
  try{
    var svg = document.getElementById("mapSvg");
    var w = svg.clientWidth, h = svg.clientHeight;
    var clone = svg.cloneNode(true);
    clone.setAttribute("xmlns", SVGNS);
    clone.setAttribute("width", w); clone.setAttribute("height", h);
    var bgRect = svgEl("rect",{x:-5000,y:-5000,width:10000,height:10000,fill:"#EEF0F5"});
    clone.querySelector("#viewport").insertBefore(bgRect, clone.querySelector("#viewport").firstChild);
    var xml = new XMLSerializer().serializeToString(clone);
    var img = new Image();
    var svgBlob = new Blob([xml], {type:"image/svg+xml;charset=utf-8"});
    var url = URL.createObjectURL(svgBlob);
    img.onload = function(){
      var scale = 2; // supersample for a crisp raster export
      var canvas = document.createElement("canvas");
      canvas.width = w*scale; canvas.height = h*scale;
      var ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);
      ctx.drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      canvas.toBlob(function(blob){
        if(blob){ download("mindmap.png", blob); showToast("Map exported as PNG"); }
        else showToast("PNG export failed — try SVG export instead");
      });
    };
    img.onerror = function(){ URL.revokeObjectURL(url); showToast("PNG export failed — try SVG export instead"); };
    img.src = url;
  }catch(err){ showToast("PNG export failed — try SVG export instead"); }
});
document.getElementById("mReset").addEventListener("click", function(){
  nodePositions = {}; savePositions(); fitToScreen(); showToast("Map layout reset");
});

// ───────────────────────── toast ─────────────────────────
var toastTimer=null;
function showToast(msg){
  var t = document.getElementById("toast");
  t.textContent = "✓ "+msg;
  t.classList.add("show");
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove("show"); }, 2200);
}

// ───────────────────────── refresh ─────────────────────────
function refreshSiteSelect(){
  var sel = document.getElementById("siteSelect");
  var sites = ["All Sites"].concat(getSiteList());
  var cur = siteFilter;
  sel.innerHTML = sites.map(function(s){ return '<option'+(s===cur?" selected":"")+'>'+esc(s)+'</option>'; }).join("");
  if(sites.indexOf(cur)<0){ siteFilter="All Sites"; sel.value="All Sites"; }
}
function refreshStats(){
  var open = issues.filter(function(i){return i.status==="Open";}).length;
  var closed = issues.filter(function(i){return i.status==="Closed";}).length;
  document.getElementById("statOpen").textContent = open;
  document.getElementById("statClosed").textContent = closed;
  document.getElementById("statTotal").textContent = issues.length;
}
function refreshAll(refit){
  refreshSiteSelect();
  refreshStats();
  renderList();
  showDetail();
  if(view==="map"){
    if(refit) fitToScreen(); else renderMap();
  }
}

// ───────────────────────── init ─────────────────────────
loadAll();
refreshAll(true);
})();
